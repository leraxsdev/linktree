<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeRaxs Linktree</title>
    <link rel="icon" type="image/png" href="https://s.imgz.io/2026/07/17/IMG_4490c7267e50e7d0470c.jpeg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-text-primary: #ffffff;
            --color-surface-base: #000000;
            --color-border-default: #e5e7eb;
            --color-accent: #FFB3D9;
            --color-accent-hover: #FF99CC;
            --font-family-primary: 'Kanit', sans-serif;
            --font-size-base: 16px;
            --font-weight-base: 400;
            --line-height-base: 24px;
            --transition-base: 200ms ease;
        }

        body {
            font-family: var(--font-family-primary);
            font-size: var(--font-size-base);
            font-weight: var(--font-weight-base);
            line-height: var(--line-height-base);
            background: var(--color-surface-base);
            color: var(--color-text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://s.imgz.io/2026/07/17/IMG_4490c7267e50e7d0470c.jpeg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: blur(10px) brightness(0.9) contrast(1.1);
            z-index: -2;
            transform: scale(1.1);
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: -1;
        }

        .rain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .raindrop {
            position: absolute;
            width: 2px;
            height: 60px;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.6) 100%);
            animation: fall linear infinite;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh);
            }
        }

        .splash {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.5) 0%, rgba(255, 255, 255, 0) 70%);
            animation: splash 0.4s ease-out infinite;
            pointer-events: none;
        }

        @keyframes splash {
            0% {
                transform: scale(0);
                opacity: 1;
            }
            100% {
                transform: scale(3);
                opacity: 0;
            }
        }

        .container {
            width: 100%;
            max-width: 420px;
            margin: 0 auto;
        }

        .profile {
            text-align: center;
            margin-bottom: 2rem;
        }

        .profile-image {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            border: 3px solid var(--color-accent);
            margin: 0 auto 1rem;
            object-fit: cover;
            background: linear-gradient(135deg, var(--color-accent) 0%, var(--color-accent-hover) 100%);
        }

        .profile-image img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .profile-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.375rem;
            letter-spacing: -0.02em;
        }

        .profile-bio {
            font-size: 0.875rem;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 0.375rem;
        }

        .profile-url {
            font-size: 0.8125rem;
            color: var(--color-accent);
            text-decoration: none;
            font-weight: 400;
        }

        .profile-url:hover {
            text-decoration: underline;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .link-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.875rem 1.25rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(229, 231, 235, 0.1);
            border-radius: 18px;
            color: var(--color-text-primary);
            text-decoration: none;
            font-weight: 400;
            font-size: 0.9375rem;
            text-align: left;
            transition: all var(--transition-base);
            position: relative;
            overflow: hidden;
        }

        .link-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255, 179, 217, 0.15) 0%, rgba(255, 153, 204, 0.15) 100%);
            opacity: 0;
            transition: opacity var(--transition-base);
        }

        .link-item:hover {
            transform: translateY(-2px);
            border-color: var(--color-accent);
            background: rgba(255, 255, 255, 0.05);
        }

        .link-item:hover::before {
            opacity: 1;
        }

        .link-item:focus-visible {
            outline: 2px solid var(--color-accent);
            outline-offset: 2px;
        }

        .link-item:active {
            transform: translateY(0);
        }

        .link-content {
            position: relative;
            z-index: 1;
            flex: 1;
        }

        .link-emoji {
            font-size: 1.125rem;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }

        .footer {
            text-align: center;
            margin-top: 2.5rem;
            padding-top: 1.5rem;
        }

        .footer-text {
            font-size: 0.8125rem;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 300;
        }

        @media (max-width: 640px) {
            .profile-title {
                font-size: 1.375rem;
            }

            .link-item {
                padding: 0.8125rem 1.125rem;
                font-size: 0.875rem;
            }

            .link-emoji {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="rain" id="rain"></div>
    <div class="container">
        <div class="profile">
            <div class="profile-image" role="img" aria-label="Profile picture">
                <img src="https://s.imgz.io/2026/07/17/IMG_4490c7267e50e7d0470c.jpeg" alt="LeRaxs Profile Picture">
            </div>
            <h1 class="profile-title">LeRaxs</h1>
            <p class="profile-bio">Welcome to my linktree</p>
            <p class="profile-bio">Have a great day!</p>
        </div>

        <nav class="links" aria-label="Main links">
            <a href="#" class="link-item" role="link">
                <span class="link-emoji">🚀</span>
                <span class="link-content">ABC</span>
            </a>
        </nav>

        <footer class="footer">
            <p class="footer-text">© LeRaxs <span id="year"></span></p>
        </footer>
    </div>

    <script>
        // Set current year
        document.getElementById('year').textContent = new Date().getFullYear();

        // Link configuration - แก้ไข URL ตรงนี้
        const links = [
            { emoji: '💸', text: 'โดเนทสนับสนุนป๋มมม <3', url: 'https://easydonate.app/leraxs001' },
            { emoji: '📥', text: 'ดาวน์โหลดแอดออน MCBE ของผม', url: 'https://curseforge.com/members/leraxs' },
            { emoji: '🍎', text: 'Youtube', url: 'https://youtube.com/@leraxs001' },
            { emoji: '🖤', text: 'TikTok', url: 'https://tiktok.com/@leraxs001' },
            { emoji: '🧪', text: 'โปรไฟล์ดิสคอร์ด', url: 'https://discord.com/users/701406531991765003' },
            { emoji: '⛏️', text: 'Minecraft Thailand', url: 'https://mc.in.th' },
        ];

        // Render links
        const linksContainer = document.querySelector('.links');
        linksContainer.innerHTML = links.map(link => `
            <a href="${link.url}" class="link-item" role="link" target="_blank" rel="noopener noreferrer">
                <span class="link-emoji">${link.emoji}</span>
                <span class="link-content">${link.text}</span>
            </a>
        `).join('');

        // Create rain effect
        const rainContainer = document.getElementById('rain');
        const isMobile = window.innerWidth <= 768;
        const numberOfDrops = isMobile ? 50 : 120;

        function createRaindrop() {
            const drop = document.createElement('div');
            drop.className = 'raindrop';
            const leftPos = Math.random() * 100;
            drop.style.left = leftPos + '%';
            drop.style.top = '-100px';
            const duration = Math.random() * 0.4 + 0.6;
            drop.style.animationDuration = duration + 's';
            drop.style.opacity = Math.random() * 0.4 + 0.3;
            rainContainer.appendChild(drop);

            // Create splash effect when raindrop reaches bottom
            setTimeout(() => {
                const splash = document.createElement('div');
                splash.className = 'splash';
                splash.style.left = leftPos + '%';
                splash.style.bottom = '0';
                rainContainer.appendChild(splash);

                setTimeout(() => splash.remove(), 400);
                drop.remove();
                createRaindrop(); // Create new drop to maintain count
            }, duration * 1000);
        }

        // Initialize raindrops
        for (let i = 0; i < numberOfDrops; i++) {
            setTimeout(() => createRaindrop(), i * 10);
        }
    </script>
</body>
</html>
